{% extends 'base.html' %}
{% block title %}Post announcement — CCS{% endblock %}
{% block content %}
<hgroup><h1>Post announcement</h1></hgroup>
<form method="post" novalidate style="max-width:560px">
  {% csrf_token %}
  {% for field in form %}
  <label>
    {{ field.label }}
    {{ field }}
    {% if field.help_text %}<small style="color:var(--pico-muted-color)">{{ field.help_text }}</small>{% endif %}
    {% for e in field.errors %}<small style="color:#d48282">{{ e }}</small>{% endfor %}
  </label>
  {% endfor %}
  <div style="display:flex;gap:1rem;margin-top:.5rem">
    <button type="submit">Post</button>
    <a href="{% url 'announcements:list' %}" role="button" class="secondary outline">Cancel</a>
  </div>
</form>
{% endblock %}
