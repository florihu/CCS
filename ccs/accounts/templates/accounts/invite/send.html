{% extends 'base.html' %}
{% block title %}Invite someone — CCS{% endblock %}
{% block content %}
<hgroup>
  <h1>Invite someone</h1>
  <p style="color:var(--pico-muted-color)">They will receive a registration link valid for 7 days.</p>
</hgroup>
<form method="post" novalidate style="max-width:480px">
  {% csrf_token %}
  {% for field in form %}
  <label>
    {{ field.label }}
    {{ field }}
    {% for e in field.errors %}<small style="color:#d48282">{{ e }}</small>{% endfor %}
  </label>
  {% endfor %}
  <div style="display:flex;gap:1rem;margin-top:.5rem">
    <button type="submit">Send invite</button>
    <a href="{% url 'accounts:dashboard' %}" role="button" class="secondary outline">Cancel</a>
  </div>
</form>
{% endblock %}
