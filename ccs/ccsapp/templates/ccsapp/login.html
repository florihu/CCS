{% extends 'ccsapp/base.html' %}
{% block title %}Log in — CCS{% endblock %}

{% block content %}
<article style="max-width:400px; margin:4rem auto;">
  <hgroup>
    <h1>CCS</h1>
    <p>Caro Care Schedule</p>
  </hgroup>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
    <label>
      {{ field.label }}
      {{ field }}
      {% for error in field.errors %}
      <small style="color:#d48282">{{ error }}</small>
      {% endfor %}
    </label>
    {% endfor %}
    <button type="submit" style="width:100%; margin-top:0.5rem">Log in</button>
  </form>
</article>
{% endblock %}
