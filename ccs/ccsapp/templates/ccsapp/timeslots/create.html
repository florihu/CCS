{% extends 'ccsapp/base.html' %}
{% block title %}New timeslot — CCS{% endblock %}

{% block content %}
<hgroup>
  <h1>New timeslot</h1>
  <p style="color:var(--pico-muted-color)">
    Creates a timeslot and proposes an activity to a user.
  </p>
</hgroup>

<form method="post" novalidate style="max-width:520px">
  {% csrf_token %}
  {% for field in form %}
  <label>
    {{ field.label }}
    {{ field }}
    {% if field.help_text %}
    <small style="color:var(--pico-muted-color)">{{ field.help_text }}</small>
    {% endif %}
    {% for error in field.errors %}
    <small style="color:#d48282">{{ error }}</small>
    {% endfor %}
  </label>
  {% endfor %}
  <div style="display:flex; gap:1rem; margin-top:0.5rem">
    <button type="submit">Create</button>
    <a href="{% url 'timeslot_list' %}" role="button" class="secondary outline">Cancel</a>
  </div>
</form>
{% endblock %}
